<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Smart Inventory System</title>
    <meta name="description" content="Premium enterprise inventory intelligence platform">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: '#6D5DF6',
              accent: '#8B5CF6',
              success: '#22C55E',
              warning: '#F59E0B',
              danger: '#EF4444',
              bg: '#0B1120',
              surface: '#111827',
              card: '#1E293B',
              text: '#FFFFFF',
              muted: '#94A3B8'
            },
            boxShadow: {
              soft: '0 10px 30px rgba(15, 23, 42, 0.35)',
              glow: '0 0 0 1px rgba(109, 93, 246, 0.45), 0 12px 32px rgba(109,93,246,0.35)'
            },
            borderRadius: {
              '2xl': '1rem'
            }
          }
        }
      };
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div class="min-h-screen bg-[radial-gradient(circle_at_top_left,_rgba(109,93,246,0.22),_transparent_28%),radial-gradient(circle_at_top_right,_rgba(139,92,246,0.18),_transparent_30%),#0B1120]">
      <div class="flex min-h-screen">
        <aside id="sidebar" class="sidebar premium-sidebar fixed inset-y-0 left-0 z-40 flex w-80 flex-col border-r border-white/10 bg-slate-950/90 backdrop-blur-xl shadow-soft">
          <div class="px-5 py-6">
            <div class="flex items-center gap-3">
              <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-brand to-accent text-white shadow-glow">
                <i class="bi bi-box-seam text-lg"></i>
              </div>
              <div>
                <div class="text-lg font-semibold text-white">AI Smart Inventory</div>
                <div class="text-xs text-slate-400">Enterprise Ops Console</div>
              </div>
            </div>
          </div>

          <div class="flex-1 px-3">
            <div class="mb-4 rounded-2xl border border-white/10 bg-white/5 px-4 py-3">
              <div class="flex items-center justify-between text-sm text-slate-300">
                <span>System health</span>
                <span class="rounded-full bg-emerald-500/15 px-2.5 py-1 text-xs font-semibold text-emerald-300">Online</span>
              </div>
            </div>

            <nav class="space-y-1.5">
              <a href="{{ url_for('auth.dashboard') }}" class="nav-link premium-nav-link group">
                <i class="bi bi-speedometer2 text-base"></i>
                <span>Overview</span>
              </a>
              <a href="{{ url_for('inventory.inventory_dashboard') }}" class="nav-link premium-nav-link group">
                <i class="bi bi-boxes text-base"></i>
                <span>Inventory</span>
              </a>
              <a href="{{ url_for('sales.sales_dashboard') }}" class="nav-link premium-nav-link group">
                <i class="bi bi-cash-coin text-base"></i>
                <span>Sales</span>
              </a>
              <a href="{{ url_for('forecast.forecast_dashboard') }}" class="nav-link premium-nav-link group">
                <i class="bi bi-graph-up text-base"></i>
                <span>Forecast</span>
              </a>
            </nav>
          </div>

          <div class="border-t border-white/10 p-4">
            <a href="{{ url_for('auth.logout') }}" class="flex items-center justify-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm font-medium text-slate-200 transition hover:border-brand hover:bg-brand/15 hover:text-white">
              <i class="bi bi-box-arrow-right"></i>
              Logout
            </a>
          </div>
        </aside>

        <div class="main-content flex-1 lg:ml-80">
          <header class="sticky top-0 z-30 border-b border-white/10 bg-slate-950/75 backdrop-blur-xl">
            <div class="flex items-center justify-between gap-3 px-4 py-4 lg:px-8">
              <div class="flex items-center gap-3">
                <button id="sidebar-toggle" class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-white/10 bg-white/5 text-slate-200 transition hover:border-brand hover:text-white lg:hidden">
                  <i class="bi bi-list text-lg"></i>
                </button>
                <div class="hidden md:block">
                  <div class="text-sm text-slate-400">Operations</div>
                  <div class="text-sm font-semibold text-white">Smart Inventory Workspace</div>
                </div>
              </div>

              <div class="flex items-center gap-2 md:gap-3">
                <div class="hidden rounded-xl border border-white/10 bg-white/5 px-3 py-2 md:flex md:items-center md:gap-2">
                  <i class="bi bi-search text-slate-400"></i>
                  <span class="text-sm text-slate-400">Search products</span>
                </div>
                <div class="rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm text-slate-200">
                  <i class="bi bi-bell text-slate-400"></i>
                </div>
                <div class="rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm text-slate-200">
                  <i class="bi bi-person-circle text-slate-400"></i>
                  <span class="ml-2">{{ session.get('username', 'User') }}</span>
                </div>
              </div>
            </div>
          </header>

          <main class="px-4 py-6 lg:px-8">
            {% block content %}{% endblock %}
          </main>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/scripts.js"></script>
  </body>
</html>
