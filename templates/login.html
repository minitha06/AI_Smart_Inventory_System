<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/styles.css">
  </head>
  <body class="login-page">
    <div class="login-container">
      <div class="login-wrapper">
        <!-- Branding Section -->
        <div class="text-center mb-5">
          <div class="login-icon-box mb-4">
            <i class="bi bi-box-seam"></i>
          </div>
          <h2 class="fw-bold mb-2">Smart Inventory System</h2>
          <p class="text-muted">Professional Inventory Management with AI Forecasting</p>
        </div>

        <!-- Login Form Card -->
        <div class="card login-card shadow-lg border-0">
          <div class="card-body p-5">
            <h3 class="card-title mb-4 text-center fw-bold">Sign In</h3>
            
            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
              <i class="bi bi-exclamation-triangle me-2"></i>
              {{ error }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endif %}

            <form method="post" action="{{ url_for('auth.login') }}" class="login-form">
              <div class="mb-4">
                <label for="username" class="form-label fw-semibold">
                  <i class="bi bi-person me-2"></i>Username
                </label>
                <input 
                  type="text" 
                  class="form-control form-control-lg login-input" 
                  id="username" 
                  name="username" 
                  placeholder="Enter your username"
                  required 
                  autofocus>
              </div>

              <div class="mb-5">
                <label for="password" class="form-label fw-semibold">
                  <i class="bi bi-lock me-2"></i>Password
                </label>
                <input 
                  type="password" 
                  class="form-control form-control-lg login-input" 
                  id="password" 
                  name="password" 
                  placeholder="Enter your password"
                  required>
              </div>

              <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold login-btn">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
              </button>
            </form>

            <div class="mt-4 pt-3 border-top text-center text-muted small">
              <p class="mb-0">Demo Credentials:</p>
              <p class="mb-0">Username: <strong>admin</strong> | Password: <strong>admin123</strong></p>
            </div>
          </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-4 text-muted small">
          <p>&copy; 2026 Smart Inventory System. All rights reserved.</p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
